name: POC Trivy github markdown template

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  # pull-requests: read
  actions: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ vars.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: thirapat12/thirapat12-node:12-alpine

      - name: Create Trivy GitHub Markdown Template
        run: |
          mkdir -p .trivy
          cat <<'EOF' > .trivy/github-markdown.tpl
          ## 📊 Trivy Scan Summary
          **Template version:** v1.1.0  
          **Maintainer:** [ AIS ITQAD Team ](mailto:itqad-devsecops@ais.co.th)  
          **Scan Timestamp:** <!-- add timestamp here via shell or workflow if needed -->

          ---

          {{ $crit := 0 }}{{ $high := 0 }}{{ $med := 0 }}{{ $low := 0 }}{{ $unk := 0 }}{{ $targets := 0 }}
          {{- range . }}
            {{ $targets = add $targets 1 }}
            {{- range .Vulnerabilities }}
              {{- if eq .Severity "CRITICAL" }}{{ $crit = add $crit 1 }}{{ end }}
              {{- if eq .Severity "HIGH" }}{{ $high = add $high 1 }}{{ end }}
              {{- if eq .Severity "MEDIUM" }}{{ $med = add $med 1 }}{{ end }}
              {{- if eq .Severity "LOW" }}{{ $low = add $low 1 }}{{ end }}
              {{- if eq .Severity "UNKNOWN" }}{{ $unk = add $unk 1 }}{{ end }}
            {{- end }}
          {{- end }}

          ### 🚦 Scan Status: {{ if or (gt $crit 0) (gt $high 0) }}❌ **Failed**{{ else }}✅ **Passed**{{ end }}

          | Severity | Count |
          |:---------|------:|
          | 🟥 <span style="background-color:#ffd6d6">**CRITICAL**</span> | <span style="background-color:#ffd6d6">**{{ $crit }}**</span> |
          | 🟧 <span style="background-color:#ffeacc">**HIGH**</span>     | <span style="background-color:#ffeacc">**{{ $high }}**</span> |
          | 🟨 <span style="background-color:#fff7cc">MEDIUM</span>       | <span style="background-color:#fff7cc">{{ $med }}</span>      |
          | 🟦 <span style="background-color:#e7f0fd">LOW</span>          | <span style="background-color:#e7f0fd">{{ $low }}</span>      |
          | ⬜ <span style="background-color:#eeeeee">UNKNOWN</span>      | <span style="background-color:#eeeeee">{{ $unk }}</span>      |

          > **Scanned Targets:** {{ $targets }}

          ---

          {{- if or (gt $crit 0) (gt $high 0) }}
          ### ⚠️ **Action Required**
          โปรดตรวจสอบและแก้ไขช่องโหว่ระดับ Critical/High โดยด่วน  

          ---
          {{- end }}

          {{- range . }}
          ### 🔍 Target: `{{ .Target }}`
          {{- if .Class }}  
          Class: `{{ .Class }}`  
          {{- end }}
          {{- if .Type }}
          Type: `{{ .Type }}`  
          {{- end }}

          {{- if .Vulnerabilities }}
          | Package | FilePath | Vulnerability ID | Severity | Installed | Fixed | Title |
          |:--------|:---------|:----------------|:---------|:----------|:------|:------|
          {{- range .Vulnerabilities }}
          | `{{ .PkgName }}` | {{ if .PkgPath }} `{{ .PkgPath }}` {{ else }} - {{ end }} | [{{ .VulnerabilityID }}](https://avd.aquasec.com/nvd/{{ .VulnerabilityID }}) | {{ if eq .Severity "CRITICAL" }}🟥 **{{ .Severity }}**{{ else if eq .Severity "HIGH" }}🟧 **{{ .Severity }}**{{ else if eq .Severity "MEDIUM" }}🟨 {{ .Severity }}{{ else if eq .Severity "LOW" }}🟦 {{ .Severity }}{{ else }}⬜ {{ .Severity }}{{ end }} | `{{ .InstalledVersion }}` | {{ if .FixedVersion }} `{{ .FixedVersion }}` {{ else }} - {{ end }} | {{ .Title }} |
          {{- end }}
          {{- else }}
          ✅ **No vulnerabilities found.**
          {{- end }}

          ---
          {{- end }}

          <sub>Report generated by [Trivy](https://github.com/aquasecurity/trivy) | Template inspired by ITQA Team</sub>
          EOF

      - name: Trivy image Scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: thirapat12/thirapat12-node:12-alpine
          format: template
          template: '@.trivy/github-markdown.tpl'
          output: 'trivy-report.md'
          exit-code: 0
          vuln-type: 'os,library'
          ignore-unfixed: true

      - name: Add Timestamp to Markdown Report
        run: |
          ts="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          sed -i "s|<!-- add timestamp here via shell or workflow if needed -->|$ts|" trivy-report.md          

      - name: Upload Trivy Report to GitHub Summary
        run: |
          cat trivy-report.md >> $GITHUB_STEP_SUMMARY
